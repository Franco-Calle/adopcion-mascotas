services:
  # 1. 🗄️ El contenedor de la Base de Datos (MariaDB)
  db:
    image: mariadb:10.11
    container_name: db_adopcion_container
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: db_adopcion
      MARIADB_USER: franco
      MARIADB_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # 2. 🐘 El contenedor del Backend (PHP 8.2 + Laravel)
  app:
    image: chialab/php:8.2-fpm
    container_name: laravel_adopcion_app
    restart: always
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    # Levanta el servidor interno de Laravel para desarrollo
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - db

  # 3. ⚡ El contenedor del Frontend (Node.js + Vite + Tailwind)
  vite:
    image: node:20-alpine
    container_name: vite_adopcion_assets
    working_dir: /app
    volumes:
      - .:/app
      - vite_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    tty: true
    stdin_open: true
    depends_on:
      - app

volumes:
  db_data:
  vite_node_modules:

