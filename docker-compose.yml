services:
  # 1. Base de Datos (MariaDB)
  db:
    image: mariadb:10.11
    container_name: db_adopcion_container
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: db_adopcion
      MARIADB_USER: franco
      MARIADB_PASSWORD: password
    # SEGURIDAD: En producción considera eliminar este mapeo de puertos
    # para que la BD no sea accesible desde internet.
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  # 2. Backend PHP (PHP-FPM — reemplaza php artisan serve)
  app:
    image: chialab/php:8.2-fpm
    container_name: laravel_adopcion_app
    restart: always
    working_dir: /var/www
    volumes:
      - .:/var/www
